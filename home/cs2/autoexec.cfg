// ==========================================
// DEFAULT CS2 BINDS (Baseline)
// ==========================================

// --- MOVEMENT ---
bind "w" "+forward"
bind "s" "+back"
bind "a" "+left"
bind "d" "+right"
bind "space" "+jump"
bind "ctrl" "+duck"
bind "shift" "+sprint"

// --- COMBAT & INTERACTION ---
bind "mouse1" "+attack"
bind "mouse2" "+attack2"
bind "r" "+reload"
bind "e" "+use"
bind "g" "drop"
bind "t" "+spray_menu"                 // Graffiti menu
bind "h" "switchhands"                 // Toggles left/right hand viewmodel

// --- INVENTORY SLOTS ---
bind "1" "slot1"
bind "2" "slot2"
bind "3" "slot3"
bind "4" "slot4"
bind "5" "slot5"     

// --- UI & COMMUNICATION ---
bind "tab" "+showscores"
bind "y" "messagemode"       
bind "u" "messagemode2"      
bind "m" "teammenu"
bind "`" "toggleconsole"     
bind "," "say eng?"                    
bind "mouse4" "+voicerecord"           

// --- RADIO WHEELS (60% Keyboard Friendly) ---
bind "i" "+radialradio"                        // Command Wheel (Follow me, Hold pos, etc.)
bind "o" "+radialradio2"                       // Standard Wheel (Yes, No, Thanks, etc.)
bind "p" "+radialradio3"                       // Report Wheel (Need backup, Enemy spotted, etc.)

// ==========================================
// CUSTOM BINDS & SETTINGS
// ==========================================

// --- QUICK BUY & EQUIP UTILITY ---
bind "q" "buy smokegrenade; slot8"
bind "z" "buy hegrenade; slot6"
bind "x" "buy molotov; buy incgrenade; slot10"
bind "c" "buy flashbang; slot7"

// --- MISC & TOGGLES ---
bind "v" "noclip"                              
bind "b" "buymenu"                             
bind "n" "voice_modenable_toggle"              
bind "k" "toggle cl_crosshair_recoil 0 1"      

// --- HUD, VIDEO & RADAR ---
r_show_build_info false                        
cl_radar_always_centered "0"
cl_radar_rotate "1"
cl_radar_background_alpha "0.00"
cl_hud_radar_scale "1.30"
cl_radar_scale "0.35"
cl_radar_scale_alternate "1.00"
cl_radar_square_with_scoreboard "1"
cl_radar_square_always "0"
cl_radar_scale_dynamic "0"

// ==========================================
// PRACTICE SERVERS (Requires sv_cheats 1)
// ==========================================

// --- UTILITY PRACTICE ---
bind "[" "sv_rethrow_last_grenade"
bind "]" "ent_fire smokegrenade_projectile kill; stopsound" 

// --- BOT MANAGEMENT ---
bind "uparrow" "bot_place"                     // Teleports a bot to exactly where you are aiming
bind "downarrow" "toggle bot_stop 0 1"         // Toggles bots freezing and moving
bind "leftarrow" "toggle bot_crouch 0 1"       // Toggles bots crouching and standing
bind "rightarrow" "bot_kick"                   // Kicks all bots from the server

// ==========================================
// PRO SETTINGS & OPTIMIZATION
// ==========================================

// --- TELEMETRY (Replaces Net_Graph) ---
cl_hud_telemetry_frametime_show "2"             // Always show FPS
cl_hud_telemetry_ping_show "2"                  // Always show Ping
cl_hud_telemetry_net_misdelivery_show "2"       // Always show Packet Loss

// --- AUDIO OPTIMIZATION ---
snd_menumusic_volume "0"                        // Mutes main menu music
snd_roundstart_volume "0"                       // Mutes round start music
snd_deathcamera_volume "0"                      // Mutes death camera music
snd_mvp_volume "0.10"                           // Lowers MVP music volume
snd_tensecondwarning_volume "0.15"              // Essential: 10-second bomb defuse warning

// --- NETWORK & PERFORMANCE ---
fps_max "0"                                     // Uncaps frame rate
rate "786432"                                   // Max bandwidth rate for best connection

// ==========================================
// ALIASES & SCRIPTS
// ==========================================

// --- VIEWMODEL TOGGLE SCRIPT ---
alias "viewmodel_preset_1" "viewmodel_fov 68; viewmodel_offset_x 2.0; viewmodel_offset_y 2.0; viewmodel_offset_z -1.5; alias toggle_viewmodel viewmodel_preset_2"
alias "viewmodel_preset_2" "viewmodel_fov 68; viewmodel_offset_x -2.0; viewmodel_offset_y -2.0; viewmodel_offset_z 2.0; alias toggle_viewmodel viewmodel_preset_1"
alias "toggle_viewmodel" "viewmodel_preset_1"

bind "j" "toggle_viewmodel"

// ==========================================
// FINALIZATION
// ==========================================
host_writeconfig
