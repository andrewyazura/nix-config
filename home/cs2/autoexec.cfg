// ==========================================
// DEFAULT CS2 BINDS (Baseline)
// ==========================================

bind "w" "+forward"
bind "s" "+back"
bind "a" "+left"
bind "d" "+right"
bind "space" "+jump"
bind "ctrl" "+duck"
bind "shift" "+sprint"

bind "mouse1" "+attack"
bind "mouse2" "+attack2"
bind "mwheeldown" "+jump"
bind "mwheelup" "+jump"

bind "r" "+reload"
bind "e" "+use"
bind "g" "drop"
bind "t" "+spray_menu"

bind "1" "slot1"
bind "2" "slot2"
bind "3" "slot3"
bind "4" "slot4"
bind "5" "slot5"     

bind "tab" "+showscores"
bind "y" "messagemode"       
bind "u" "messagemode2"      
bind "m" "teammenu"
bind "`" "toggleconsole"     
bind "," "say eng?"                    
bind "mouse4" "+voicerecord"           

bind "alt" "+radialradio"

cl_radial_radio_tab_0_text_1 "#Chatwheel_holdposition"
cl_radial_radio_tab_0_text_2 "#Chatwheel_followme"
cl_radial_radio_tab_0_text_3 "#Chatwheel_affirmative"
cl_radial_radio_tab_0_text_4 "#Chatwheel_negative"
cl_radial_radio_tab_0_text_5 "#Chatwheel_cheer"
cl_radial_radio_tab_0_text_6 "#Chatwheel_compliment"
cl_radial_radio_tab_0_text_7 "#Chatwheel_thanks"
cl_radial_radio_tab_0_text_8 "#Chatwheel_sorry"

// ==========================================
// CUSTOM BINDS & SETTINGS
// ==========================================

// --- QUICK BUY & EQUIP UTILITY ---
bind "q" "buy smokegrenade; slot8"
bind "z" "buy hegrenade; slot6"
bind "x" "buy molotov; buy incgrenade; slot10"
bind "c" "buy flashbang; slot7"

bind "v" "noclip"                              
bind "b" "buymenu"                             
bind "n" "voice_modenable_toggle"              

r_show_build_info false                        
cl_hide_avatar_images "2"
cl_radar_always_centered "0"
cl_radar_rotate "1"
cl_hud_radar_background_alpha "0.00"
cl_hud_radar_scale "1.15"
cl_radar_scale "0.35"
cl_radar_scale_alternate "1.00"
cl_radar_square_with_scoreboard "1"
cl_radar_square_always "0"
cl_radar_scale_dynamic "0"

// ==========================================
// PRACTICE SERVERS (Requires sv_cheats 1)
// ==========================================

bind "[" "sv_rethrow_last_grenade"
bind "]" "ent_fire smokegrenade_projectile kill; stopsound" 

bind "uparrow" "bot_place"
bind "downarrow" "toggle bot_stop 0 1"
bind "leftarrow" "toggle bot_crouch 0 1"
bind "rightarrow" "bot_kick"

// ==========================================
// PRO SETTINGS & OPTIMIZATION
// ==========================================

// --- MOUSE & CROSSHAIR ---
sensitivity "1.2"
zoom_sensitivity_ratio "1.0"
apply_crosshair_code "CSGO-qF7Jn-yhEkv-rWWCB-n7nZe-6ONMB"

cl_hud_telemetry_frametime_show "2"
cl_hud_telemetry_ping_show "2"
cl_hud_telemetry_net_misdelivery_show "2"
cl_hud_telemetry_serverrecvmargin_graph_show "2"

snd_menumusic_volume "0"
snd_roundstart_volume "0"
snd_deathcamera_volume "0"
snd_mvp_volume "0.10"
snd_tensecondwarning_volume "0.15"

fps_max "0"
rate "786432"

// ==========================================
// ALIASES & SCRIPTS
// ==========================================

alias "viewmodel_preset_1" "viewmodel_fov 68; viewmodel_offset_x 2.0; viewmodel_offset_y 2.0; viewmodel_offset_z -1.5; alias toggle_viewmodel viewmodel_preset_2"
alias "viewmodel_preset_2" "viewmodel_fov 68; viewmodel_offset_x -2.0; viewmodel_offset_y -2.0; viewmodel_offset_z 2.0; alias toggle_viewmodel viewmodel_preset_1"
alias "toggle_viewmodel" "viewmodel_preset_1"

bind "h" "switchhands"
bind "j" "toggle_viewmodel"
bind "k" "toggle cl_crosshair_recoil 0 1"      

// ==========================================
// FINALIZATION
// ==========================================
host_writeconfig
