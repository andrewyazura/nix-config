// ==========================================
// CS2 PRACTICE CONFIG (No Warmup Banner)
// ==========================================

// Enable Cheats
sv_cheats 1

// Kick Bots
bot_kick

// Match & Round Settings (Bypasses Warmup)
mp_warmup_end
mp_maxrounds 9999
mp_roundtime 60
mp_roundtime_defuse 60
mp_freezetime 0
mp_respawn_on_death_ct 1
mp_respawn_on_death_t 1
mp_ignore_round_win_conditions 1
mp_halftime 0

// Money & Buying
mp_maxmoney 60000
mp_startmoney 60000
mp_buytime 9999
mp_buy_anywhere 1

// Ammo & Weapons
sv_infinite_ammo 1
ammo_grenade_limit_total 5
mp_drop_knife_enable 1

// Grenade Trajectories & Previews
sv_grenade_trajectory_prac_pipreview 1
sv_grenade_trajectory_prac_trailtime 8
sv_showimpacts 1
sv_showimpacts_time 10

// Auto-bhop (for zooming around maps)
sv_enablebunnyhopping 1
sv_autobunnyhopping 1

// Apply all changes
mp_restartgame 1
